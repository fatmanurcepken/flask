apiVersion: v1
kind: Service

metadata:
  name: flask-app-service
  namespace: flask-mongodb
  labels:
    app: flask-app
    app.kubernetes.io/part-of: flask-mongodb

spec:
  type: NodePort

  selector:
    app: flask-app

  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
