apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: flask-mongodb
  labels:
    app: flask-app
    app.kubernetes.io/part-of: flask-mongodb

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: flask-app
        app.kubernetes.io/part-of: flask-mongodb

    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "MongoDB hazır olana kadar bekleniyor..."
              until nc -z -w 2 mongodb-service 27017; do
                echo "MongoDB henüz hazır değil. 3 saniye bekleniyor..."
                sleep 3
              done
              echo "MongoDB hazır! Flask başlatılıyor..."

      containers:
        - name: flask-app
          image: flask-app:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 5000
              name: http

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flask-mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flask-mongodb-secret
                  key: FLASK_SECRET_KEY

            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: flask-mongodb-config
                  key: MONGO_HOST

            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: flask-mongodb-config
                  key: MONGO_PORT

            - name: MONGO_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: flask-mongodb-config
                  key: MONGO_DB_NAME

            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: flask-mongodb-config
                  key: FLASK_ENV

            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: flask-mongodb-config
                  key: FLASK_DEBUG

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
