# =============================================================================
# secret.yaml — Kubernetes Secret Tanımı
# =============================================================================
#
# Secret Nedir?
# =============
# Kubernetes Secret, şifre, token ve anahtar gibi hassas bilgileri
# güvenli şekilde depolamak için kullanılan özel bir kaynak türüdür.
#
# ConfigMap'ten Farkı:
# ---------------------
# - ConfigMap: Hassas olmayan yapılandırma verileri (port, hostname vb.)
# - Secret: Hassas veriler (şifre, API key, sertifika vb.)
#
# Güvenlik Notları:
# -----------------
# 1. Secret değerleri BASE64 encoded olmalıdır (şifreleme DEĞİL!)
#    Base64 encoding sadece binary verileri text olarak saklamak içindir.
#    Bu yüzden production'da ek güvenlik önlemleri gereklidir:
#    - Kubernetes Secrets Encryption at Rest
#    - External Secret Manager (HashiCorp Vault, AWS Secrets Manager)
#    - Sealed Secrets (Bitnami)
#
# 2. Secret'ları Git'e COMMIT ETMEYİN!
#    .gitignore'a ekleyin veya şifrelenmiş hale getirin.
#
# Base64 Değer Üretme (PowerShell):
#   [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("değer"))
#
# Base64 Değer Üretme (Linux/Mac):
#   echo -n "değer" | base64
#
# Mevcut Değerler (base64 encoded):
#   admin              → YWRtaW4=
#   securepassword123  → c2VjdXJlcGFzc3dvcmQxMjM=
#   your-super-secret-key-change-in-production → eW91ci1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u
# =============================================================================

apiVersion: v1
kind: Secret

metadata:
  name: flask-mongodb-secret
  namespace: flask-mongodb
  labels:
    app.kubernetes.io/part-of: flask-mongodb

# Opaque: Genel amaçlı secret türü (diğer türler: kubernetes.io/tls, kubernetes.io/dockerconfigjson vb.)
type: Opaque

# data: Base64 encoded değerler
# NOT: Bu dosyayı production ortamında kullanmayın!
#      CI/CD pipeline'ınızdan gerçek değerleri enjekte edin.
data:
  # MongoDB root kullanıcı adı: "admin"
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=

  # MongoDB root şifresi: "securepassword123"
  # Production'da: openssl rand -base64 32 ile üretin
  MONGO_INITDB_ROOT_PASSWORD: c2VjdXJlcGFzc3dvcmQxMjM=

  # Flask secret key: "your-super-secret-key-change-in-production"
  # Production'da: python -c "import secrets; print(secrets.token_hex(32))" ile üretin
  FLASK_SECRET_KEY: eW91ci1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u
