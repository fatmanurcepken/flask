apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  namespace: flask-mongodb
  labels:
    app: mongodb
    app.kubernetes.io/part-of: flask-mongodb

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: mongodb
        app.kubernetes.io/part-of: flask-mongodb

    spec:
      containers:
        - name: mongodb
          image: mongo:7.0

          ports:
            - containerPort: 27017
              name: mongodb

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: flask-mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
