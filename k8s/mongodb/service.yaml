apiVersion: v1
kind: Service

metadata:
  name: mongodb-service
  namespace: flask-mongodb
  labels:
    app: mongodb
    app.kubernetes.io/part-of: flask-mongodb

spec:
  type: ClusterIP

  selector:
    app: mongodb

  ports:
    - name: mongodb
      protocol: TCP
      port: 27017
      targetPort: 27017
