{{/*
=============================================================================
mongodb-pvc.yaml — Helm Template: MongoDB PersistentVolumeClaim
=============================================================================
values.yaml'da mongodb.persistence.enabled: true ise PVC oluşturur.
Bu sayede persistence isteğe bağlı hale gelir (test ortamları için kapatılabilir).
=============================================================================
*/}}

{{- if .Values.mongodb.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ .Release.Name }}-mongodb-pvc
  namespace: {{ include "flask-mongodb.namespace" . }}
  labels:
    {{- include "flask-mongodb.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb

spec:
  accessModes:
    - {{ .Values.mongodb.persistence.accessMode }}

  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}

  {{- if .Values.mongodb.persistence.storageClass }}
  storageClassName: {{ .Values.mongodb.persistence.storageClass }}
  {{- end }}
{{- end }}
