{{/*
=============================================================================
secret.yaml — Helm Template: Kubernetes Secret
=============================================================================
values.yaml'daki secrets bölümünden değerleri okur ve Base64'e encode eder.

Helm'in b64enc fonksiyonu: string → base64 dönüşümü yapar
Örnek: {{ .Values.secrets.mongoRootPassword | b64enc | quote }}
       "securepassword123" → "c2VjdXJlcGFzc3dvcmQxMjM="
=============================================================================
*/}}

apiVersion: v1
kind: Secret

metadata:
  name: {{ include "flask-mongodb.secretName" . }}
  namespace: {{ include "flask-mongodb.namespace" . }}
  labels:
    {{- include "flask-mongodb.labels" . | nindent 4 }}
  annotations:
    # Helm release bilgileri annotation olarak eklenir
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}

type: Opaque

data:
  # b64enc: Helm'in built-in Base64 encoding fonksiyonu
  # quote: String değeri tırnak içine alır (YAML parsing hatalarını önler)
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongoRootUsername | b64enc | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | b64enc | quote }}
  FLASK_SECRET_KEY: {{ .Values.secrets.flaskSecretKey | b64enc | quote }}
