nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: flask-mongodb

flask:
  replicas: 2

  image:
    repository: fatmanurcepken/flask-app
    tag: "latest"
    pullPolicy: Always

  service:
    type: NodePort
    port: 5000
    nodePort: 30500

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 0

  env:
    FLASK_ENV: "production"
    FLASK_DEBUG: "0"

mongodb:
  replicas: 1

  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 27017

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  persistence:
    enabled: true
    storageClass: "standard"
    size: "1Gi"
    accessMode: ReadWriteOnce

  strategy:
    type: Recreate

  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

secrets:
  mongoRootUsername: "admin"
  mongoRootPassword: "securepassword123"
  flaskSecretKey: "your-super-secret-key-change-in-production"

config:
  mongoDbName: "TaskManager"
